services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vikunja_net

  vikunja:
    image: vikunja/vikunja:latest
    user: "0:0"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3456:3456"
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_PORT: "5432"
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      VIKUNJA_DATABASE_DATABASE: ${POSTGRES_DB}
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL}
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: ${VIKUNJA_ENABLE_REGISTRATION}
    volumes:
      - vikunja_files:/app/vikunja/files
    healthcheck:
      test: ["CMD", "/app/vikunja/vikunja", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vikunja_net

  mcp-adapter:
    build:
      context: ./mcp_adapter
    restart: unless-stopped
    depends_on:
      vikunja:
        condition: service_healthy
    environment:
      VIKUNJA_URL: ${VIKUNJA_INTERNAL_URL}
      VIKUNJA_API_TOKEN: ${VIKUNJA_API_TOKEN}
      MCP_TRANSPORT: streamable-http
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - vikunja_net

  bridge-worker:
    build:
      context: ./mcp_adapter
    profiles: ["bridge"]
    restart: unless-stopped
    depends_on:
      vikunja:
        condition: service_healthy
    environment:
      VIKUNJA_URL: ${VIKUNJA_INTERNAL_URL}
      VIKUNJA_API_TOKEN: ${VIKUNJA_API_TOKEN}
      VIKUNJA_TIMEOUT: "15"
      BRIDGE_PROJECT_IDS: ${BRIDGE_PROJECT_IDS:-}
      BRIDGE_PROJECT_FILTERS_JSON: ${BRIDGE_PROJECT_FILTERS_JSON:-}
      BRIDGE_POLL_INTERVAL: ${BRIDGE_POLL_INTERVAL:-15}
      BRIDGE_CONFIRM_TTL_HOURS: ${BRIDGE_CONFIRM_TTL_HOURS:-24}
      BRIDGE_CONFIRM_ALLOWED_USERS: ${BRIDGE_CONFIRM_ALLOWED_USERS:-}
      BRIDGE_NOTIFY_COMMAND: ${BRIDGE_NOTIFY_COMMAND:-}
      BRIDGE_NOTIFY_TIMEOUT_SECONDS: ${BRIDGE_NOTIFY_TIMEOUT_SECONDS:-8}
      BRIDGE_MODE_FILE: ${BRIDGE_MODE_FILE:-}
      BRIDGE_SKIP_DONE: ${BRIDGE_SKIP_DONE:-true}
      BRIDGE_ALLOWED_BUCKET_IDS: ${BRIDGE_ALLOWED_BUCKET_IDS:-}
      BRIDGE_REQUIRED_LABELS: ${BRIDGE_REQUIRED_LABELS:-}
      BRIDGE_ALLOW_MODE_COMMENT_OVERRIDE: ${BRIDGE_ALLOW_MODE_COMMENT_OVERRIDE:-false}
      BRIDGE_PENDING_COMMENTS_FILE: ${BRIDGE_PENDING_COMMENTS_FILE:-}
      BRIDGE_PENDING_COMMENTS_MAX: ${BRIDGE_PENDING_COMMENTS_MAX:-500}
      BRIDGE_BACKOFF_MIN_SECONDS: ${BRIDGE_BACKOFF_MIN_SECONDS:-5}
      BRIDGE_BACKOFF_MAX_SECONDS: ${BRIDGE_BACKOFF_MAX_SECONDS:-300}
      BRIDGE_TRIGGER_FILE: ${BRIDGE_TRIGGER_FILE:-/var/lib/vikunja-bridge/trigger.signal}
      BRIDGE_TRIGGER_CHECK_SECONDS: ${BRIDGE_TRIGGER_CHECK_SECONDS:-1.0}
      LOG_LEVEL: INFO
    command:
      [
        "python",
        "-m",
        "vikunja_mcp.bridge_worker",
        "--project-id",
        "${BRIDGE_PROJECT_ID:-13}",
        "--project-ids",
        "${BRIDGE_PROJECT_IDS:-}",
        "--project-filters-json",
        "${BRIDGE_PROJECT_FILTERS_JSON:-}",
        "--state-file",
        "${BRIDGE_STATE_FILE:-/var/lib/vikunja-bridge/state.json}",
        "--interval",
        "${BRIDGE_POLL_INTERVAL:-15}",
        "--confirm-ttl-hours",
        "${BRIDGE_CONFIRM_TTL_HOURS:-24}",
        "--confirm-allowed-users",
        "${BRIDGE_CONFIRM_ALLOWED_USERS:-}",
        "--notify-command",
        "${BRIDGE_NOTIFY_COMMAND:-}",
        "--notify-timeout-seconds",
        "${BRIDGE_NOTIFY_TIMEOUT_SECONDS:-8}",
        "--mode-file",
        "${BRIDGE_MODE_FILE:-}",
        "--allowed-bucket-ids",
        "${BRIDGE_ALLOWED_BUCKET_IDS:-}",
        "--required-labels",
        "${BRIDGE_REQUIRED_LABELS:-}",
        "--pending-comments-file",
        "${BRIDGE_PENDING_COMMENTS_FILE:-}",
        "--pending-comments-max",
        "${BRIDGE_PENDING_COMMENTS_MAX:-500}",
        "--backoff-min-seconds",
        "${BRIDGE_BACKOFF_MIN_SECONDS:-5}",
        "--backoff-max-seconds",
        "${BRIDGE_BACKOFF_MAX_SECONDS:-300}",
        "--trigger-file",
        "${BRIDGE_TRIGGER_FILE:-/var/lib/vikunja-bridge/trigger.signal}",
        "--trigger-check-seconds",
        "${BRIDGE_TRIGGER_CHECK_SECONDS:-1.0}",
      ]
    volumes:
      - bridge_state:/var/lib/vikunja-bridge
      - bridge_work:/srv/work
    networks:
      - vikunja_net

  bridge-webhook:
    build:
      context: ./mcp_adapter
    profiles: ["bridge", "webhook"]
    restart: unless-stopped
    environment:
      BRIDGE_WEBHOOK_HOST: 0.0.0.0
      BRIDGE_WEBHOOK_PORT: ${BRIDGE_WEBHOOK_PORT:-8090}
      BRIDGE_WEBHOOK_PATH: ${BRIDGE_WEBHOOK_PATH:-/vikunja/webhook}
      BRIDGE_WEBHOOK_TOKEN: ${BRIDGE_WEBHOOK_TOKEN:-}
      BRIDGE_WEBHOOK_MAX_BODY_BYTES: ${BRIDGE_WEBHOOK_MAX_BODY_BYTES:-1048576}
      BRIDGE_TRIGGER_FILE: ${BRIDGE_TRIGGER_FILE:-/var/lib/vikunja-bridge/trigger.signal}
      LOG_LEVEL: INFO
    command:
      [
        "python",
        "-m",
        "vikunja_mcp.bridge_webhook",
        "--host",
        "0.0.0.0",
        "--port",
        "${BRIDGE_WEBHOOK_PORT:-8090}",
        "--path",
        "${BRIDGE_WEBHOOK_PATH:-/vikunja/webhook}",
        "--token",
        "${BRIDGE_WEBHOOK_TOKEN:-}",
        "--trigger-file",
        "${BRIDGE_TRIGGER_FILE:-/var/lib/vikunja-bridge/trigger.signal}",
        "--max-body-bytes",
        "${BRIDGE_WEBHOOK_MAX_BODY_BYTES:-1048576}",
      ]
    ports:
      - "${BRIDGE_WEBHOOK_PORT:-8090}:${BRIDGE_WEBHOOK_PORT:-8090}"
    volumes:
      - bridge_state:/var/lib/vikunja-bridge
    networks:
      - vikunja_net

volumes:
  db_data:
  vikunja_files:
  bridge_state:
  bridge_work:

networks:
  vikunja_net:
    driver: bridge
